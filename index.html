<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Strawberry Rush 🍓</title>
<!--
  CSP note: all scripts are same-origin files, no inline JS, no eval, no
  external resources. When hosting, serve with:
  Content-Security-Policy: default-src 'none'; script-src 'self'; style-src 'unsafe-inline'; img-src 'self'
  (No meta tag here so the game also runs from a plain file:// double-click.)
-->
<style>
  :root {
    --ink: #0c1220;
    --cream: #eef0f6;
    --accent: #7ef0d0;
    --straw: #ff6b81;
    --gold: #ffd650;
    --glass: rgba(10, 14, 28, 0.62);
    --glass-edge: rgba(255, 255, 255, 0.10);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: var(--ink); }
  body { color: var(--cream); font-family: system-ui, 'Segoe UI', Roboto, sans-serif; }
  canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; }

  .chip {
    background: var(--glass); border: 1px solid var(--glass-edge); border-radius: 999px;
    padding: 6px 13px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    font-size: clamp(0.74rem, 1.5vw, 0.92rem); line-height: 1.2; white-space: nowrap;
  }
  #hud {
    position: fixed; top: 14px; left: 14px; right: 14px;
    display: flex; gap: 7px; align-items: center; flex-wrap: wrap; pointer-events: none; z-index: 2;
  }
  #hud .spacer { flex: 1; }
  #hud-hearts { letter-spacing: 0.10em; }
  #hud-berries { font-weight: 600; }
  #hud-zone { color: #b9c6d6; font-style: italic; }
  #hud-time { font-variant-numeric: tabular-nums; color: #cfd6e4; }
  #hud-dash { color: #9aa6c9; }
  #hud-dash.armed { color: var(--accent); font-weight: 700; border-color: rgba(126,240,208,0.4);
    animation: glow 0.9s ease-in-out infinite alternate; }
  .item-chip { color: #e5dcc4; }
  .item-chip.empty { opacity: 0.4; }
  .item-chip.spent { opacity: 0.5; text-decoration: line-through; }
  #hud-passive { color: #c8bce6; }
  @keyframes glow { from { opacity: 0.7; } to { opacity: 1; } }
  .pulse { animation: pop 0.35s ease-out; }
  @keyframes pop { 30% { transform: scale(1.25); } 100% { transform: scale(1); } }

  #progress { position: fixed; top: 0; left: 0; right: 0; height: 4px; background: rgba(255,255,255,0.08); z-index: 3; }
  #progress-fill { height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--straw));
    transition: width 0.25s ease-out; box-shadow: 0 0 12px rgba(126,240,208,0.5); }

  #toast { position: fixed; top: 64px; left: 50%; transform: translate(-50%, -8px);
    background: var(--glass); border: 1px solid var(--glass-edge);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    color: var(--cream); padding: 8px 18px; border-radius: 999px;
    font-size: clamp(0.8rem, 1.8vw, 0.95rem); white-space: nowrap;
    opacity: 0; pointer-events: none; transition: opacity 0.25s, transform 0.25s; z-index: 4; }
  #toast.show { opacity: 1; transform: translate(-50%, 0); }

  .screen {
    position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(6, 9, 20, 0.74); backdrop-filter: blur(7px); -webkit-backdrop-filter: blur(7px);
    padding: 20px; text-align: center; z-index: 5; overflow-y: auto;
  }
  .screen.hidden { display: none; }
  #overlay-title { font-size: clamp(1.7rem, 6vw, 3.1rem); font-weight: 800; letter-spacing: 0.03em;
    margin-bottom: 12px; text-shadow: 0 0 30px rgba(255,107,129,0.35); }
  #overlay-sub { font-size: clamp(0.88rem, 2.2vw, 1.05rem); max-width: 54ch; color: #ccd4e2; line-height: 1.55; }
  .btn-row { display: flex; gap: 12px; margin-top: 22px; flex-wrap: wrap; justify-content: center; }
  button.btn {
    font: inherit; font-weight: 600; color: var(--ink); background: var(--accent);
    border: none; border-radius: 999px; padding: 11px 24px; cursor: pointer;
    transition: transform 0.1s, filter 0.1s;
  }
  button.btn:hover { filter: brightness(1.08); }
  button.btn:active { transform: scale(0.96); }
  button.btn.ghost { background: transparent; color: var(--cream); border: 1px solid var(--glass-edge); }
  button.btn:disabled { opacity: 0.4; cursor: default; filter: none; }

  /* ---- shop ---- */
  #shop { align-items: stretch; }
  .shop-inner { width: min(880px, 100%); margin: auto; }
  #shop h2 { font-size: clamp(1.4rem, 4vw, 2.1rem); font-weight: 800; text-align: center; }
  .shop-bank { text-align: center; color: var(--gold); font-weight: 700; font-size: 1.15rem; margin: 4px 0 14px; }
  .shop-section-title { font-size: 0.82rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: #9fb0c8; margin: 16px 0 8px; text-align: left; }
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .card {
    background: rgba(255,255,255,0.035); border: 1px solid var(--glass-edge); border-radius: 12px;
    padding: 12px; text-align: left; display: flex; flex-direction: column; gap: 6px;
  }
  .card.equipped { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
  .card .name { font-weight: 700; font-size: 0.98rem; }
  .card .name .tag { font-size: 0.68rem; color: var(--ink); background: var(--accent);
    border-radius: 6px; padding: 1px 6px; margin-left: 6px; vertical-align: middle; }
  .card .desc { font-size: 0.8rem; color: #b9c2d2; line-height: 1.35; flex: 1; }
  .card .row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  button.mini { font: inherit; font-size: 0.78rem; font-weight: 600; border-radius: 8px;
    padding: 6px 11px; cursor: pointer; border: none; }
  button.mini.buy { background: var(--gold); color: #2a2410; }
  button.mini.equip { background: rgba(126,240,208,0.18); color: var(--accent); border: 1px solid rgba(126,240,208,0.4); }
  button.mini.on { background: var(--accent); color: var(--ink); }
  button.mini.up { background: rgba(180,150,255,0.2); color: #cbb8ff; border: 1px solid rgba(180,150,255,0.4); }
  button.mini:disabled { opacity: 0.4; cursor: default; }
  .cost { color: var(--gold); font-weight: 700; font-size: 0.82rem; }
  .owned-tag { color: var(--accent); font-size: 0.78rem; font-weight: 600; }

  /* ---- handbook ---- */
  .hb-inner { width: min(760px, 100%); margin: auto; text-align: left; }
  #handbook h2 { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 800; text-align: center; margin-bottom: 6px; }
  .hb-lead { text-align: center; color: #b9c2d2; margin-bottom: 16px; font-size: 0.92rem; }
  .hb-section { margin: 14px 0; }
  .hb-section h3 { font-size: 0.8rem; letter-spacing: 0.14em; text-transform: uppercase; color: #9fb0c8; margin-bottom: 8px; }
  .hb-row { display: flex; gap: 10px; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.06); align-items: baseline; }
  .hb-row .k { flex: 0 0 42%; font-weight: 600; color: var(--cream); }
  .hb-row .v { flex: 1; color: #b9c2d2; font-size: 0.88rem; line-height: 1.4; }

  #hint { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
    font-size: 0.72rem; color: rgba(230,235,245,0.42); white-space: nowrap; pointer-events: none; z-index: 2; }
</style>
</head>
<body>
  <div id="progress"><div id="progress-fill"></div></div>
  <canvas id="game" width="966" height="620"></canvas>

  <div id="hud">
    <span id="title" class="chip">🍓 <b>RUSH</b></span>
    <span id="hud-hearts" class="chip">❤️❤️❤️</span>
    <span id="hud-berries" class="chip">🍓 0</span>
    <span id="hud-dash" class="chip">dash 3 🍓</span>
    <span id="hud-item1" class="chip item-chip empty">—</span>
    <span id="hud-item2" class="chip item-chip empty">—</span>
    <span id="hud-passive" class="chip">no passive</span>
    <span id="hud-sloth" class="chip hidden">standing still — move!</span>
    <span class="spacer"></span>
    <span id="hud-zone" class="chip">—</span>
    <span id="hud-time" class="chip">0:00.0</span>
  </div>

  <div id="toast"></div>

  <div id="overlay" class="screen hidden">
    <div id="overlay-title"></div>
    <div id="overlay-sub"></div>
    <div id="overlay-buttons" class="btn-row"></div>
  </div>

  <div id="shop" class="screen hidden">
    <div class="shop-inner">
      <h2>The Clubhouse Shop 🍓</h2>
      <div class="shop-bank" id="shop-bank"></div>
      <div id="shop-body"></div>
      <div class="btn-row">
        <button class="btn" id="shop-continue">Continue</button>
        <button class="btn ghost" id="shop-handbook">Handbook</button>
      </div>
    </div>
  </div>

  <div id="handbook" class="screen hidden">
    <div class="hb-inner">
      <h2>The Groundskeeper’s Handbook</h2>
      <div class="hb-lead">Everything you’ll meet on the grounds — and what counters it.</div>
      <div id="handbook-body"></div>
      <div class="btn-row"><button class="btn" id="handbook-close">Close</button></div>
    </div>
  </div>

  <div id="hint">move: arrows / WASD · dash: double-tap a direction or Shift · swipe on touch</div>

  <script src="src/logic.js"></script>
  <script src="src/render.js"></script>
  <script src="src/input.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
